<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="todo-card">

    <h1 class="title">My To-Do List</h1>

    <!-- Input row: type a task and add it -->
    <div class="input-row">
      <input
        type="text"
        id="task-input"
        placeholder="What do you need to do?"
        autocomplete="off"
      />
      <button id="add-task-btn">Add Task</button>
    </div>

    <!-- Message shown when the input is empty -->
    <p id="empty-warning" class="empty-warning"></p>

    <!-- Task list gets filled in by JavaScript -->
    <ul id="task-list" class="task-list"></ul>

    <!-- Task statistics -->
    <div class="task-stats">
      <span id="total-count">Total: 0</span>
      <span id="completed-count">Completed: 0</span>
      <span id="pending-count">Pending: 0</span>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
